format = """¥
($directory)¥
$os¥
$git_branch¥
$fill¥
$nodejs¥
$rust¥
$golang¥
$php¥
$bun¥
$java¥
$c¥
$conda¥
$zig¥
$cmd_duration¥
$time¥
¥n$character¥
"""

add_newline = true
command_timeout = 3600000
palette = "ii"

[fill]
symbol = ' '

[palettes.ii]
# Basado en el scheme ii (violeta #c2c1ff)
text = "#e5e1e7"          # onSurface
subtext0 = "#918f9a"      # outline
subtext1 = "#c8c5d1"      # onSurfaceVariant
overlay0 = "#353438"      # surfaceContainerHighest
overlay1 = "#2a292e"      # surfaceContainerHigh
overlay2 = "#201f23"      # surfaceContainer
surface0 = "#1c1b1f"      # surfaceContainerLow
surface1 = "#131317"      # surface
surface2 = "#0e0e12"      # surfaceContainerLowest
base = "none"
mantle = "#131317"
crust = "#131317"

# Colores funcionales
blue = "#c2c1ff"          # primary (violeta)
mauve = "#c2c1ff"         # primary
purple = "#7171ac"        # primaryContainer
lavender = "#c6c4e0"      # secondary
pink = "#f5b2e0"          # tertiary
green = "#b7cc85"         # success
red = "#ffb4ab"           # error
yellow = "#ffe066"        # warning
peach = "#deba87"         # warm accent
teal = "#7aa89f"          # cool accent
rosewater = "#e5e1e7"     # onSurface
flamingo = "#c8c5d1"      # onSurfaceVariant
maroon = "#47464f"        # surfaceVariant
sapphire = "#595992"      # inversePrimary
sky = "#45455c"           # secondaryContainer

[character]
success_symbol = "[暿璃 ](fg:green)"
error_symbol = "[暿璃 ](fg:red)"
vimcmd_symbol = "[N](bold red)"
vimcmd_replace_one_symbol = "[R](bold peach)"
vimcmd_visual_symbol = "[V](bold mauve)"

[username]
style_user = 'bold blue'
style_root = 'bold red'
format = '[暿璃 $user](fg:$style) '
disabled = false
show_always = true

[directory]
format = "[$path](bold $style)[$read_only]($read_only_style) "
truncation_length = 2
style = "fg:blue"
read_only_style = "fg:subtext0"
before_repo_root_style = "fg:subtext0"
truncation_symbol = "窶ｦ/"
truncate_to_repo = true
read_only = "  "

[directory.substitutions]
"Documents" = "㬚媧 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[cmd_duration]
format = " took [ $duration]($style) "
style = "bold fg:yellow"
min_time = 500

[git_branch]
format = "-> [$symbol$branch]($style) "
style = "bold fg:mauve"
symbol = " "

[git_status]
format = '[$all_status$ahead_behind ]($style)'
style = "fg:text bg:surface0"

[docker_context]
disabled = true
symbol = " "

[python]
disabled = false
format = "[$symbol$pyenv_prefix($version)( $virtualenv)](fg:peach)"
symbol = " "
version_format = "$raw"

[java]
format = '[[ $symbol ($version) ](fg:red)]($style)'
version_format = "$raw"
symbol = " "
disabled = false

[c]
format = '[[ $symbol ($version) ](fg:blue)]($style)'
symbol = " "
version_format = "$raw"
disabled = false

[zig]
format = '[[ $symbol ($version) ](fg:peach)]($style)'
version_format = "$raw"
disabled = false

[bun]
version_format = "$raw"
format = '[[ $symbol ($version) ](fg:text)]($style)'
disabled = false

[nodejs]
symbol = ""
format = '[[ $symbol ($version) ](fg:green)]($style)'

[rust]
symbol = ""
format = '[[ $symbol ($version) ](fg:red)]($style)'

[golang]
symbol = ""
format = '[[ $symbol ($version) ](fg:teal)]($style)'

[php]
symbol = ""
format = '[[ $symbol ($version) ](fg:peach)]($style)'

[time]
disabled = false
time_format = "%R"
format = '[[   $time ](fg:subtext0)]($style)'
