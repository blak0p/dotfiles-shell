# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                          DOTFILES-SHELL - KITTY                              ║
# ║                     With cursor trail + transparency                         ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
# vim:fileencoding=utf-8:foldmethod=marker


# ┌──────────────────────────────────────────────────────────────────────────────┐
# │                                   FONT                                       │
# └──────────────────────────────────────────────────────────────────────────────┘

font_family      JetBrainsMono Nerd Font
font_size        14.0


# ┌──────────────────────────────────────────────────────────────────────────────┐
# │                                  WINDOW                                      │
# └──────────────────────────────────────────────────────────────────────────────┘

background_opacity 0.75
background_blur 20


# ┌──────────────────────────────────────────────────────────────────────────────┐
# │                                  CURSOR                                      │
# └──────────────────────────────────────────────────────────────────────────────┘

cursor_shape          block
cursor_blink_interval 0.5
cursor_stop_blinking_after 0
shell_integration     no-cursor

# Cursor trail — native kitty effect
cursor_trail 2
cursor_trail_decay 0.4 0.7


# ┌──────────────────────────────────────────────────────────────────────────────┐
# │                            NEOVIM OPTIMIZATIONS                              │
# └──────────────────────────────────────────────────────────────────────────────┘

term xterm-kitty
undercurl_style thin-sparse
scrollback_lines 10000
repaint_delay    10
input_delay      3
sync_to_monitor  yes
allow_remote_control yes
listen_on unix:/tmp/kitty
enable_audio_bell no


# ┌──────────────────────────────────────────────────────────────────────────────┐
# │                              KEY MAPPINGS                                    │
# └──────────────────────────────────────────────────────────────────────────────┘

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard


# ┌──────────────────────────────────────────────────────────────────────────────┐
# │                           GENTLEMAN THEME                                    │
# └──────────────────────────────────────────────────────────────────────────────┘

background            #06080f
foreground            #f3f6f9
cursor                #e0c15a
selection_background  #263356
selection_foreground  #f3f6f9
url_color             #7fb4ca

color0  #06080f
color1  #cb7c94
color2  #b7cc85
color3  #ffe066
color4  #7fb4ca
color5  #ff8dd7
color6  #7aa89f
color7  #f3f6f9

color8  #8a8fa3
color9  #de8fa8
color10 #d1e8a9
color11 #fff7b1
color12 #a3d4d5
color13 #ffaeea
color14 #7fb4ca
color15 #f3f6f9